apiVersion: batch/v1
kind: CronJob
metadata:
  name: influxdb-backup
  namespace: database
spec:
  # Run daily at 3:00 AM
  schedule: "0 3 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: influxdb-backup
            image: influxdb:2.8.0
            command:
            - /bin/bash
            - -c
            - |
              set -e

              curl -m 5 --retry 5 "${INFLUXDB_HEALTHCHECKS_URL}/start"
              
              # Install AWS CLI
              apt-get update && apt-get install -y curl unzip
              curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
              unzip -q awscliv2.zip
              ./aws/install
              
              BACKUP_DATE=$(date +%Y%m%d_%H%M%S)
              BACKUP_DIR="/backup/influxdb_backup_${BACKUP_DATE}"
              BACKUP_ARCHIVE="/backup/influxdb_backup_${BACKUP_DATE}.tar.gz"
              S3_PATH="s3://${S3_BUCKET}/influxdb-backups/influxdb_backup_${BACKUP_DATE}.tar.gz"
              
              echo "Starting InfluxDB backup at $(date)"
              
              # Perform the backup using influx backup
              influx backup ${BACKUP_DIR} \
                --host http://influxdb2:8086 \
                --token ${INFLUX_TOKEN}
              
              echo "Backup completed to: ${BACKUP_DIR}"
              
              # Create compressed archive
              tar -czf ${BACKUP_ARCHIVE} -C /backup influxdb_backup_${BACKUP_DATE}
              echo "Archive created: ${BACKUP_ARCHIVE}"
              echo "Archive size: $(du -h ${BACKUP_ARCHIVE})"
              
              # Remove uncompressed backup directory
              rm -rf ${BACKUP_DIR}
              
              # Upload to iDrive S3
              echo "Uploading to iDrive S3..."
              aws s3 cp ${BACKUP_ARCHIVE} ${S3_PATH} \
                --endpoint-url ${S3_ENDPOINT}
              
              if [ $? -eq 0 ]; then
                echo "Successfully uploaded to S3: ${S3_PATH}"
              else
                echo "ERROR: Failed to upload to S3"
                exit 1
              fi
              
              # Delete local backups older than 7 days
              echo "Cleaning up old local backups..."
              find /backup -name "influxdb_backup_*.tar.gz" -mtime +7 -delete
              
              # Delete S3 backups older than 30 days
              echo "Cleaning up old S3 backups..."
              CUTOFF_DATE=$(date -d '30 days ago' +%Y%m%d)
              aws s3 ls s3://${S3_BUCKET}/influxdb-backups/ --endpoint-url ${S3_ENDPOINT} | \
                awk '{print $4}' | \
                grep "influxdb_backup_" | \
                while read file; do
                  FILE_DATE=$(echo $file | sed 's/influxdb_backup_\([0-9]\{8\}\).*/\1/')
                  if [ "$FILE_DATE" -lt "$CUTOFF_DATE" ]; then
                    echo "Deleting old backup: $file"
                    aws s3 rm s3://${S3_BUCKET}/influxdb-backups/$file --endpoint-url ${S3_ENDPOINT}
                  fi
                done
              
              curl -m 10 --retry 5 "${INFLUXDB_HEALTHCHECKS_URL}"

              echo "Backup process completed at $(date)"
            env:
            - name: INFLUX_TOKEN
              valueFrom:
                secretKeyRef:
                  name: influxdb-secrets
                  key: admin-token
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: database-backup-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: database-backup-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: database-backup-secrets
                  key: S3_ENDPOINT
            - name: S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: database-backup-secrets
                  key: S3_BUCKET
            - name: INFLUXDB_HEALTHCHECKS_URL
              valueFrom:
                secretKeyRef:
                  name: database-backup-secrets
                  key: INFLUXDB_HEALTHCHECKS_URL
            volumeMounts:
            - name: backup-storage
              mountPath: /backup
          restartPolicy: OnFailure
          volumes:
          - name: backup-storage
            persistentVolumeClaim:
              claimName: database-backups