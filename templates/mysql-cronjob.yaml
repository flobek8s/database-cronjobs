apiVersion: batch/v1
kind: CronJob
metadata:
  name: mysql-backup
  namespace: database
spec:
  # Run daily at 2 AM
  schedule: "0 2 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: mysql-backup
            image: amazon/aws-cli:latest
            command:
            - /bin/bash
            - -c
            - |
              set -e
              curl -m 5 --retry 5 "${MYSQL_HEALTHCHECKS_URL}/start"
              # Install mysql client
              dnf install -y mariadb105 gzip
              
              BACKUP_DATE=$(date +%Y%m%d_%H%M%S)
              DATABASES="mylivetemps ip_tracker"
              
              echo "Starting backup at $(date)"

              for DB in ${DATABASES}; do
                BACKUP_FILE="/backup/${DB}_backup_${BACKUP_DATE}.sql.gz"
                S3_PATH="s3://${S3_BUCKET}/mysql-backups/${DB}_backup_${BACKUP_DATE}.sql.gz"

                echo "Backing up ${DB}..."
                mysqldump -h mysql \
                  -u ${MYSQL_BACKUP_USER} \
                  -p${MYSQL_BACKUP_PASSWORD} \
                  --single-transaction \
                  --quick \
                  --lock-tables=false \
                  --routines \
                  --triggers \
                  --events \
                  --databases ${DB} \
                  | gzip > ${BACKUP_FILE}

                echo "Backup completed: ${BACKUP_FILE}"
                echo "Backup size: $(du -h ${BACKUP_FILE})"

                # Upload to iDrive S3
                echo "Uploading ${DB} backup to iDrive S3..."
                aws s3 cp ${BACKUP_FILE} ${S3_PATH} \
                  --endpoint-url ${S3_ENDPOINT}

                if [ $? -eq 0 ]; then
                  echo "Successfully uploaded to S3: ${S3_PATH}"
                else
                  echo "ERROR: Failed to upload ${DB} backup to S3"
                  exit 1
                fi
              done
              
              # Optional: Delete local backups older than 7 days
              echo "Cleaning up old local backups..."
              find /backup -name "*_backup_*.sql.gz" -mtime +7 -delete
              
              # Optional: Delete S3 backups older than 30 days
              echo "Cleaning up old S3 backups..."
              CUTOFF_DATE=$(date -d '30 days ago' +%Y%m%d)
              aws s3 ls s3://${S3_BUCKET}/mysql-backups/ --endpoint-url ${S3_ENDPOINT} | \
                awk '{print $4}' | \
                grep "_backup_" | \
                while read file; do
                  FILE_DATE=$(echo $file | sed 's/.*_backup_\([0-9]\{8\}\).*/\1/')
                  if [ "$FILE_DATE" -lt "$CUTOFF_DATE" ]; then
                    echo "Deleting old backup: $file"
                    aws s3 rm s3://${S3_BUCKET}/mysql-backups/$file --endpoint-url ${S3_ENDPOINT}
                  fi
                done

              curl -m 10 --retry 5 "${MYSQL_HEALTHCHECKS_URL}"

              echo "Backup process completed at $(date)"
            env:
            - name: MYSQL_BACKUP_USER
              valueFrom:
                secretKeyRef:
                  name: database-backup-secrets
                  key: MYSQL_BACKUP_USER
            - name: MYSQL_BACKUP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: database-backup-secrets
                  key: MYSQL_BACKUP_PASSWORD
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: database-backup-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: database-backup-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: database-backup-secrets
                  key: S3_ENDPOINT
            - name: S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: database-backup-secrets
                  key: S3_BUCKET
            - name: MYSQL_HEALTHCHECKS_URL
              valueFrom:
                secretKeyRef:
                  name: database-backup-secrets
                  key: MYSQL_HEALTHCHECKS_URL
            volumeMounts:
            - name: backup-storage
              mountPath: /backup
          restartPolicy: OnFailure
          volumes:
          - name: backup-storage
            persistentVolumeClaim:
              claimName: database-backups